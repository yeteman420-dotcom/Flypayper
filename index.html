<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SquachAcers: Universe Shifter 19X</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-bright:#FFD700;--red:#ff3333;--neon:#44ff44;--ortho:#00ffff;--tactical-bg:#010201;--ui-glow:rgba(68,255,68,0.4);}
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none;outline:none;}
  body{background:#000;color:#fff;font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100dvh;width:100vw;}
  #gc{position:relative;width:min(500px,100vw);height:min(700px,100vh);background:var(--tactical-bg);border:2px solid #1a331a;overflow:hidden;box-shadow:0 0 60px #000,0 0 25px var(--ui-glow);}
  canvas{display:block;width:100%;height:100%;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 14px;pointer-events:none;z-index:100;}
  .hb{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.8);padding:6px 10px;border:1px solid rgba(68,255,68,0.25);border-radius:4px;min-width:78px;backdrop-filter:blur(5px);}
  .hl{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
  .hv{font-family:'Black Ops One',cursive;font-size:21px;color:#fff;text-shadow:0 0 10px var(--gold);}
  .system-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:36px;text-align:center;background:rgba(0,0,0,0.97);backdrop-filter:blur(15px);}
  #ss{background:radial-gradient(circle at center,#0a220a 0%,#000 100%);}
  .logo{font-family:'Black Ops One',cursive;font-size:46px;color:var(--neon);text-shadow:0 0 35px #1a5e1a;letter-spacing:5px;}
  .version-tag{font-family:'Black Ops One',cursive;font-size:10px;color:#666;letter-spacing:8px;margin-bottom:20px;}
  .btn{font-family:'Black Ops One',cursive;font-size:17px;letter-spacing:4px;padding:16px 44px;border:2px solid var(--neon);background:transparent;color:var(--neon);cursor:pointer;transition:0.3s ease;text-transform:uppercase;margin-top:20px;}
  .btn:hover{background:rgba(68,255,68,0.15);box-shadow:0 0 30px var(--neon);transform:scale(1.05);}
  #mode-banner{position:absolute;top:82px;width:100%;text-align:center;font-family:'Black Ops One',cursive;font-size:14px;color:var(--neon);z-index:150;letter-spacing:4px;pointer-events:none;}
  #integrity-meter{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:150;background:rgba(0,0,0,0.6);padding:7px 14px;border-radius:40px;border:1px solid rgba(68,255,68,0.3);pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:92%;}
  .notification{position:absolute;font-family:'Black Ops One',cursive;font-size:17px;color:var(--ortho);pointer-events:none;z-index:500;animation:viralPop 1.2s ease-out forwards;white-space:nowrap;}
  @keyframes viralPop{0%{opacity:0;transform:translateY(30px) scale(0.8)}20%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-90px) scale(1.3)}}
  #boss-bar{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);width:82%;display:none;z-index:150;pointer-events:none;}
  #boss-bar-label{font-family:'Black Ops One',cursive;font-size:10px;color:var(--red);letter-spacing:3px;text-align:center;margin-bottom:4px;}
  #boss-bar-track{width:100%;height:12px;background:rgba(0,0,0,0.8);border:1px solid var(--red);border-radius:6px;overflow:hidden;}
  #boss-bar-fill{height:100%;background:linear-gradient(90deg,#ff3333,#ff8800);border-radius:6px;transition:width 0.1s;box-shadow:0 0 8px #ff3333;}
  #mute-btn{position:absolute;top:10px;right:10px;z-index:300;background:rgba(0,0,0,0.7);border:1px solid rgba(68,255,68,0.3);color:#44ff44;font-size:15px;padding:5px 9px;cursor:pointer;border-radius:4px;font-family:'Black Ops One',cursive;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
  <div id="hud">
    <div class="hb"><div class="hl">GRID_PTS</div><div class="hv" id="sc">0</div></div>
    <div class="hb"><div class="hl">WAVE</div><div class="hv" id="waveHud">1</div></div>
    <div class="hb"><div class="hl">BONUS_X</div><div class="hv" id="mult">1.0</div></div>
  </div>
  <div id="mode-banner"></div>
  <div id="integrity-meter"></div>
  <div id="boss-bar">
    <div id="boss-bar-label">⚠ MEGA SQUACH TITAN ⚠</div>
    <div id="boss-bar-track"><div id="boss-bar-fill" style="width:100%"></div></div>
  </div>

  <div class="system-screen" id="ss">
    <div class="logo">SQUACHACERS</div>
    <div class="version-tag">19X TITAN BUILD</div>
    <div style="font-size:78px;margin:14px 0;filter:drop-shadow(0 0 20px #2e7d32)">🦶</div>
    <div style="color:#888;font-size:13px;line-height:1.9;letter-spacing:1px">ORTHOSCAN AI INTEGRITY: ACTIVE<br>ALIGN MODTOE MODULES<br>OBLITERATE ACERS ANOMALIES</div>
    <button class="btn" onclick="initializeEngine()">INITIALIZE SCAN</button>
  </div>

  <div class="system-screen" id="gs" style="display:none">
    <div style="font-family:'Black Ops One';font-size:42px;color:var(--red);text-shadow:0 0 25px #600">SQUACH DOWN</div>
    <div id="final-stats" style="font-size:64px;color:#fff;margin:12px 0">0</div>
    <div class="hl" style="margin-bottom:14px">TOTAL GRID RECOVERY</div>
    <div id="gs-wave" style="font-family:'Black Ops One';font-size:13px;color:#888;margin-bottom:8px;letter-spacing:3px"></div>
    <button class="btn" onclick="initializeEngine()">RE-SCAN GRID</button>
  </div>
</div>

<script>
// ============== SETUP ==============
const GW = 500, GH = 700;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
canvas.width = GW; canvas.height = GH;

let scaleFactor = 1;
function resize() {
  scaleFactor = Math.min(window.innerWidth / GW, window.innerHeight / GH * 0.98);
  const gc = document.getElementById('gc');
  gc.style.width = (GW * scaleFactor) + 'px';
  gc.style.height = (GH * scaleFactor) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============== AUDIO ==============
let audioCtx, masterGain, muted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.22;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

function playTone(freq, dur, type = 'square', vol = 0.3, when = null) {
  if (muted || !audioCtx) return;
  const t = when || audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g).connect(masterGain);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

const sfx = {
  jump: () => { playTone(520,0.05,'square',0.4); playTone(780,0.08,'square',0.3,audioCtx?.currentTime+0.04); },
  land: () => playTone(220,0.08,'square',0.45),
  hit: () => { playTone(140,0.18,'sawtooth',0.6); playTone(90,0.25,'square',0.4,audioCtx?.currentTime+0.06); },
  coin: () => { [920,1240,1560].forEach((f,i)=>playTone(f,0.08,'sine',0.35,audioCtx?.currentTime+i*0.05)); },
  align: () => { [680,920,1240].forEach((f,i)=>playTone(f,0.09,'triangle',0.32,audioCtx?.currentTime+i*0.06)); },
  bossHit: () => playTone(280,0.12,'sawtooth',0.5),
  waveClear: () => { [640,820,1040,1280].forEach((f,i)=>playTone(f,0.14,'square',0.28,audioCtx?.currentTime+i*0.1)); }
};

// ============== GAME STATE ==============
let state = 'standby';
let score = 0, wave = 1, lives = 9, inv = 0;
let sqX = GW/2, sqY = GH-140, tx = GW/2, ty = GH-140;
let lastTime = 0, waveTime = 0, shake = 0, grace = 0;
let obs = [], beams = [], particles = [], ws = {}, boss = null, bossPhase = 0;

const MODES = [
  {name:'MODTOE ALIGNMENT', col:'#44ff44', icon:'🦶', type:'align'},
  {name:'CRYPTID MAZE',     col:'#00ffff', icon:'👾', type:'maze'},
  {name:'RHYTHM SQUACH',    col:'#ff44ff', icon:'🎵', type:'rhythm'},
  {name:'SQUACH RUNNER',    col:'#ff8800', icon:'🦍', type:'jump'},
  {name:'FLOOPY SQUACH',    col:'#00ff88', icon:'🐦', type:'flap'},
  {name:'MEGA SQUACH TITAN',col:'#ff3333', icon:'💀', type:'boss'}
];

function getMode() { return MODES[(wave-1) % MODES.length]; }

// ============== INPUT ==============
function updateTarget(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  tx = (cx - r.left) / scaleFactor;
  ty = (cy - r.top) / scaleFactor;
}
canvas.addEventListener('mousemove', updateTarget);
canvas.addEventListener('touchmove', e=>{e.preventDefault();updateTarget(e);},{passive:false});
canvas.addEventListener('click', ()=>{if(state==='active') doAction();});
canvas.addEventListener('touchstart', e=>{updateTarget(e);if(state==='active') doAction();},{passive:false});

function doAction() {
  initAudio();
  const t = getMode().type;
  if (['align','maze','rhythm','boss'].includes(t)) beams.push({x:sqX, y:sqY-38, vy:-1600});
  if (t==='flap') { ws.vy = -15; sfx.jump(); }
  if (t==='jump' && ws.jumpsLeft > 0) {
    ws.vy = -17.5; ws.jumpsLeft--; ws.grounded = false; sfx.jump();
  }
}

// ============== HELPERS ==============
function debris(x,y,col,n=12) {
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*520,vy:(Math.random()-0.5)*520,life:1,decay:1.15+Math.random(),col,sz:3+Math.random()*4});
}

function notify(x,y,txt,col='#00ffff') {
  const el = document.createElement('div'); el.className='notification'; el.textContent=txt;
  el.style.left = Math.max(10,Math.min(GW-140,x-55))+'px'; el.style.top=y+'px'; el.style.color=col;
  document.getElementById('gc').appendChild(el); setTimeout(()=>el.remove(),1300);
}

function syncHUD() {
  document.getElementById('sc').textContent = Math.floor(score);
  document.getElementById('waveHud').textContent = wave;
  document.getElementById('mult').textContent = (1 + wave*0.25).toFixed(1);
  const m = document.getElementById('integrity-meter'); m.innerHTML='';
  for(let i=0;i<9;i++){
    const s=document.createElement('span'); s.textContent='🌲'; s.style.fontSize='19px';
    s.style.opacity = i<lives?'1':'0.15'; s.style.filter = i<lives?'drop-shadow(0 0 6px #44ff44)':'grayscale(1)';
    m.appendChild(s);
  }
  const bb = document.getElementById('boss-bar');
  if(boss){ bb.style.display='block'; document.getElementById('boss-bar-fill').style.width = (boss.hp/boss.maxHp*100)+'%'; }
  else bb.style.display='none';
}

// ============== INITIALIZE ==============
function initializeEngine() {
  score=0; wave=1; lives=9; waveTime=0; state='active'; boss=null; bossPhase=0;
  obs=[]; beams=[]; particles=[]; shake=0; inv=0; grace=0;
  sqX=GW/2; sqY=GH-140; tx=GW/2; ty=GH-140;
  document.getElementById('ss').style.display='none';
  document.getElementById('gs').style.display='none';
  configureWave();
  lastTime = performance.now();
  syncHUD();
  requestAnimationFrame(mainLoop);
}

function configureWave() {
  const m = getMode();
  obs=[]; beams=[]; grace=1.6;
  ws = {spawn:1.0, vy:0, scale:1+wave*0.18, grounded:true, jumpsLeft:2, rhythmT:0, rhythmBPM:105+wave*13, warningZones:[], lanes:[80,175,270,365,460]};
  if(m.type==='maze') ws.dots = Array.from({length:8+wave},()=>({x:60+Math.random()*(GW-120),y:140+Math.random()*(GH-280),active:true}));
  if(m.type==='jump'){ sqX=95; sqY=GH-110; ws.grounded=true; ws.jumpsLeft=2; }
  if(m.type==='flap'){ sqX=120; sqY=GH/2; ws.vy=0; }
  if(m.type==='boss'){ boss={x:GW/2,y:130,vx:2.8+wave*0.35,hp:28+wave*7,maxHp:28+wave*7,shootT:0,size:54}; bossPhase=0; }
  document.getElementById('mode-banner').textContent = m.icon + ' ' + m.name;
  document.getElementById('mode-banner').style.color = m.col;
  initAudio();
}

function processDamage(x,y) {
  if(inv>0 || grace>0) return;
  lives--; inv=2.0; shake=2.2; sfx.hit(); debris(x,y,'#ff3333',22);
  notify(x,y-35,'-INTEGRITY','#ff3333');
  if(lives<=0) state='over';
  syncHUD();
}

// ============== BOSS ==============
function updateBoss(dt,ts) {
  if(!boss) return;
  const hpPct = boss.hp / boss.maxHp;
  if(hpPct<0.66 && bossPhase<1){ bossPhase=1; boss.vx*=1.45; notify(GW/2,GH/2-50,'PHASE 2!','#ff8800'); debris(boss.x,boss.y,'#ff8800',30,true); }
  if(hpPct<0.33 && bossPhase<2){ bossPhase=2; boss.vx*=1.35; notify(GW/2,GH/2-50,'ENRAGED!','#ff0000'); debris(boss.x,boss.y,'#ff0000',40,true); }
  boss.x += boss.vx; boss.y = 130 + Math.sin(ts*0.0012)*48;
  if(boss.x > GW-65 || boss.x < 65) boss.vx *= -1;
  boss.shootT -= dt;
  if(boss.shootT <= 0){
    boss.shootT = bossPhase>=2 ? 1.0 : bossPhase>=1 ? 1.4 : 2.0;
    if(bossPhase>=2) for(let a=-1;a<=1;a++) obs.push({id:'laser',x:boss.x,y:boss.y+boss.size,vy:620,vx:a*110,life:1.1});
    else if(bossPhase>=1) [-130,0,130].forEach(ox=>obs.push({id:'laser',x:boss.x+ox,y:-30,vy:640,vx:0,life:1.2}));
    else { obs.push({id:'stomp',x:boss.x,y:GH-170,w:110,life:1.2}); shake=1.4; debris(boss.x,GH-165,'#ff5500',22,true); }
  }
  if(Math.hypot(boss.x-sqX, boss.y-sqY) < boss.size+32) processDamage(sqX,sqY);
}

function drawBoss(ts) {
  if(!boss) return;
  const p = 1 + Math.sin(ts*0.005)*0.12;
  ctx.save(); ctx.translate(boss.x, boss.y); ctx.shadowBlur=40; ctx.shadowColor='#ff3333';
  ctx.fillStyle='#5a1212'; ctx.beginPath(); ctx.ellipse(0,0,boss.size,boss.size*1.15,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(-boss.size*0.75, -boss.size*0.25, boss.size*1.5, boss.size*0.55);
  ctx.fillStyle='#ff4400';
  for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*22-12,-boss.size*0.8); ctx.lineTo(i*22,-boss.size*1.35); ctx.lineTo(i*22+12,-boss.size*0.8); ctx.fill(); }
  ctx.shadowBlur=25; ctx.shadowColor='#f00'; ctx.fillStyle='#f00';
  ctx.beginPath(); ctx.arc(-20,-14,13*p,0,Math.PI*2); ctx.arc(20,-14,13*p,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(-20,-14,5,0,Math.PI*2); ctx.arc(20,-14,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#ff3333'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-22,16); ctx.lineTo(-9,24); ctx.lineTo(0,19); ctx.lineTo(9,24); ctx.lineTo(22,16); ctx.stroke();
  if(bossPhase>=1){
    ctx.strokeStyle='rgba(255,0,200,0.35)'; ctx.lineWidth=3; ctx.shadowBlur=10; ctx.shadowColor='#ff00ff';
    ctx.beginPath(); ctx.moveTo(-20,-14); ctx.lineTo(-20,GH-boss.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20,-14); ctx.lineTo(20,GH-boss.y); ctx.stroke(); ctx.shadowBlur=0;
  }
  ctx.shadowBlur=12; ctx.shadowColor = bossPhase>=2?'#ff8800':'#ff4400'; ctx.fillStyle = bossPhase>=2?'#ff8800':'#ff4400';
  for(let i=-3;i<=3;i++) ctx.beginPath(); ctx.arc(i*15,boss.size*1.08,10,0,Math.PI*2); ctx.fill();
  ctx.restore(); ctx.shadowBlur=0;
}

// ============== RHYTHM ==============
function rhythmBeat() {
  const blocked = [...ws.lanes].sort(()=>Math.random()-0.5).slice(0,1+Math.floor(Math.random()*2));
  blocked.forEach(lx => ws.warningZones.push({x:lx, warnT:0.82}));
}

// ============== MAIN LOOP ==============
function mainLoop(ts) {
  if(state !== 'active'){
    if(state==='over'){
      document.getElementById('gs').style.display='flex';
      document.getElementById('final-stats').textContent = Math.floor(score);
      document.getElementById('gs-wave').textContent = `WAVE ${wave} REACHED`;
    }
    return;
  }

  const dt = Math.min((ts - lastTime)/1000, 0.06);
  lastTime = ts;
  waveTime += dt;
  const m = getMode();
  if(grace>0) grace -= dt;

  // Player movement
  if(m.type==='maze'){ sqX += (tx-sqX)*0.19; sqY += (ty-sqY)*0.19; }
  else if(m.type==='jump'){
    ws.vy += 0.78; sqY += ws.vy;
    if(sqY >= GH-110){ sqY = GH-110; if(!ws.grounded) sfx.land(); ws.grounded=true; ws.jumpsLeft=2; ws.vy=0; }
    sqX = 95;
  }
  else if(m.type==='flap'){ ws.vy += 0.58; sqY += ws.vy; sqY = Math.max(35, Math.min(GH-60, sqY)); if(sqY<=38 || sqY>=GH-58) processDamage(sqX,sqY); }
  else if(m.type==='rhythm'){
    const near = ws.lanes.reduce((a,b)=>Math.abs(b-tx)<Math.abs(a-tx)?b:a);
    sqX += (near-sqX)*0.32; sqY = GH-140;
  }
  else { sqX += (tx-sqX)*0.26; sqY = GH-140; }
  if(m.type !== 'jump') sqX = Math.max(32, Math.min(GW-32, sqX));

  // Spawn
  ws.spawn -= dt;
  if(ws.spawn <= 0){
    const spd = (260 + wave*28) * Math.min(ws.scale||1, 2.5);
    if(m.type==='maze') obs.push({id:'acer',x:Math.random()*GW,y:-50,vy:spd*0.6,vx:(Math.random()-0.5)*200});
    else if(m.type==='align') obs.push({id:'modtoe',x:40+Math.random()*(GW-80),y:-60,vy:spd});
    else if(m.type==='flap'){
      const gap = Math.max(145,205-wave*8), gy=80+Math.random()*(GH-280-gap);
      obs.push({id:'pipe_t',x:GW+30,y:0,w:60,h:gy,vx:-spd*0.55});
      obs.push({id:'pipe_b',x:GW+30,y:gy+gap,w:60,h:GH,vx:-spd*0.55});
    }
    else if(m.type==='jump'){
      obs.push({id:'barrel',x:GW+65,y:GH-110,vx:-(spd*1.1)});
      if(Math.random()<0.4) obs.push({id:'runcoin',x:GW+65,y:GH-180,vx:-(spd*1.1)});
    }
    ws.spawn = m.type==='flap' ? 2.4 / (ws.scale||1) : 0.85 / (ws.scale||1);
  }

  // Rhythm
  if(m.type==='rhythm'){
    ws.rhythmT += dt; const iv = 60/ws.rhythmBPM;
    if(ws.rhythmT >= iv){ ws.rhythmT -= iv; rhythmBeat(); }
    for(let i=ws.warningZones.length-1;i>=0;i--){
      const z=ws.warningZones[i]; z.warnT-=dt;
      if(z.warnT<=0){ obs.push({id:'beat',x:z.x,y:-40,vy:820+wave*55}); ws.warningZones.splice(i,1); }
    }
  }

  if(m.type==='boss') updateBoss(dt, ts);

  // Beams
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i]; b.y += b.vy*dt; let hit=false;
    if(boss && m.type==='boss' && Math.hypot(b.x-boss.x,b.y-boss.y)<boss.size){
      boss.hp--; debris(b.x,b.y,'#00ffff',8); score+=55*(ws.scale||1); sfx.bossHit(); beams.splice(i,1); hit=true;
      if(boss.hp<=0){ debris(boss.x,boss.y,'#ff8800',65,true); notify(GW/2,GH/2-60,'BOSS DEFEATED!','#ffd700'); score+=12000*(ws.scale||1); sfx.waveClear(); boss=null; bossPhase=0; waveTime=45; }
      syncHUD(); continue;
    }
    if(!hit) for(let j=obs.length-1;j>=0;j--){
      const o=obs[j];
      if(['pipe_t','pipe_b','stomp','beat','barrel','runcoin'].includes(o.id)) continue;
      if(Math.hypot(b.x-o.x,b.y-o.y)<44){ score+=50*(ws.scale||1); debris(o.x,o.y,'#00ffff'); obs.splice(j,1); beams.splice(i,1); hit=true; break; }
    }
    if(!hit && b.y < -60) beams.splice(i,1);
  }

  // Obstacles update + collision
  for(let i=obs.length-1;i>=0;i--){
    const o = obs[i];
    o.y += (o.vy||0)*dt; o.x += (o.vx||0)*dt;

    if(o.id==='stomp'){ o.life-=dt*1.8; o.w+=220*dt; if(o.life<=0){obs.splice(i,1);continue;} if(Math.abs(sqX-o.x)<o.w/2 && Math.abs(sqY-o.y)<35) processDamage(sqX,sqY); continue; }
    if(o.id==='pipe_t'){ if(sqX>o.x&&sqX<o.x+o.w&&sqY<o.h) processDamage(sqX,sqY); if(o.x+o.w<-10) obs.splice(i,1); continue; }
    if(o.id==='pipe_b'){ if(sqX>o.x&&sqX<o.x+o.w&&sqY>o.y) processDamage(sqX,sqY); if(o.x+o.w<-10) obs.splice(i,1); continue; }
    if(o.id==='beat'){ if(o.y>GH+30){obs.splice(i,1);continue;} if(o.y>GH-230 && Math.abs(sqX-o.x)<46 && sqY>GH-230) processDamage(sqX,sqY); continue; }
    if(o.id==='laser'){ o.life-=dt*0.8; if(o.life<=0||o.y>GH+50){obs.splice(i,1);continue;} if(Math.hypot(o.x-sqX,o.y-sqY)<38) processDamage(sqX,sqY); continue; }
    if(o.id==='barrel'){
      if(Math.hypot(o.x-sqX,o.y-sqY)<38){ processDamage(sqX,sqY); obs.splice(i,1); }
      if(o.x < -80) obs.splice(i,1); continue;
    }
    if(o.id==='runcoin'){
      if(Math.hypot(o.x-sqX,o.y-sqY)<32){ score+=200*(ws.scale||1); debris(o.x,o.y,'#ffd700',8); notify(o.x,o.y,'+COIN','#ffd700'); sfx.coin(); obs.splice(i,1); }
      if(o.x < -80) obs.splice(i,1); continue;
    }

    const hr = o.id==='modtoe' ? 38 : 42;
    if(Math.hypot(o.x-sqX,o.y-sqY)<hr){
      if(o.id==='modtoe'){ score+=300*(ws.scale||1); notify(o.x,o.y,'+ALIGNED','#44ff44'); sfx.align(); obs.splice(i,1); }
      else { processDamage(sqX,sqY); obs.splice(i,1); }
    } else if(o.y > GH+80 || o.x < -180 || o.x > GW+180){
      if(o.id==='modtoe') processDamage(sqX, GH-20);
      obs.splice(i,1);
    }
  }

  // Maze dots
  if(m.type==='maze' && ws.dots){
    ws.dots.forEach(d=>{ if(d.active && Math.hypot(d.x-sqX,d.y-sqY)<35){ d.active=false; score+=150; debris(d.x,d.y,'#fff',6); }});
    if(ws.dots.length && ws.dots.every(d=>!d.active)){ score+=2200; waveTime=45; notify(GW/2,GH/2,'MAZE CLEAR!','#00ffff'); sfx.waveClear(); }
  }

  // Wave transition
  if(waveTime > 43){
    score += wave*1600; wave++; waveTime=0; configureWave(); notify(GW/2,GH/2,'UNIVERSE SHIFT!','#ffd700'); sfx.waveClear(); shake=1.2;
  }

  if(inv>0) inv-=dt; if(shake>0) shake-=dt*5.5;

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=290*dt; p.life-=p.decay*dt;
    if(p.life<=0) particles.splice(i,1);
  }

  // ============== RENDER ==============
  ctx.save();
  if(shake > 0.05) ctx.translate((Math.random()-0.5)*shake*7, (Math.random()-0.5)*shake*5);

  ctx.fillStyle = '#000'; ctx.fillRect(0,0,GW,GH);

  // Simple grid
  ctx.strokeStyle = m.type==='boss' ? '#1f0505' : '#0e1f0e'; ctx.lineWidth=1;
  for(let x=0;x<GW;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
  for(let y=0;y<GH;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke(); }

  // Mode backgrounds (minimal)
  if(m.type==='flap'){
    const sky = ctx.createLinearGradient(0,0,0,GH); sky.addColorStop(0,'#001a2a'); sky.addColorStop(1,'#002f4a');
    ctx.fillStyle=sky; ctx.fillRect(0,0,GW,GH);
  }
  if(m.type==='rhythm'){
    ws.lanes.forEach(lx=>{ ctx.save(); ctx.globalAlpha=0.12; ctx.fillStyle='#cc00ff'; ctx.fillRect(lx-30,0,60,GH); ctx.restore(); });
  }
  if(m.type==='boss'){ ctx.strokeStyle='rgba(200,0,0,0.12)'; ctx.lineWidth=90; ctx.beginPath(); ctx.arc(GW/2,GH/2,320,0,Math.PI*2); ctx.stroke(); }

  // Maze dots
  if(m.type==='maze' && ws.dots) ws.dots.forEach(d=>{ if(d.active){ ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor='#00ffff'; ctx.beginPath(); ctx.arc(d.x,d.y,7,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }});

  // Particles
  particles.forEach(p=>{ ctx.globalAlpha = Math.max(0,p.life); ctx.fillStyle=p.col; ctx.fillRect(p.x-p.sz/2, p.y-p.sz/2, p.sz, p.sz); }); ctx.globalAlpha=1;

  // Beams
  beams.forEach(b=>{ ctx.fillStyle='#00ffff'; ctx.shadowBlur=12; ctx.shadowColor='#00ffff'; ctx.fillRect(b.x-3,b.y,6,28); ctx.shadowBlur=0; });

  // Obstacles
  ctx.textAlign='center';
  obs.forEach(o=>{
    if(o.id==='stomp'){ ctx.save(); ctx.globalAlpha=o.life*0.8; ctx.strokeStyle='#ff5500'; ctx.lineWidth=4; ctx.shadowBlur=15; ctx.shadowColor='#ff5500'; ctx.beginPath(); ctx.ellipse(o.x,o.y,o.w/2,18,0,0,Math.PI*2); ctx.stroke(); ctx.restore(); return; }
    if(o.id==='pipe_t' || o.id==='pipe_b'){
      ctx.fillStyle='#005500'; ctx.fillRect(o.x, o.id==='pipe_t'?o.y:o.y, o.w, o.id==='pipe_t'?o.h:GH-o.y);
      ctx.fillStyle='#008800'; ctx.fillRect(o.x-6, o.id==='pipe_t'?o.h-28:o.y, o.w+12, 28);
      return;
    }
    if(o.id==='beat'){ ctx.save(); ctx.shadowBlur=20; ctx.shadowColor='#ff44ff'; ctx.fillStyle='rgba(255,68,255,0.85)'; ctx.fillRect(o.x-34,o.y,68,40); ctx.font='24px Arial'; ctx.fillText('🎵',o.x,o.y+30); ctx.restore(); return; }
    if(o.id==='laser'){ ctx.save(); ctx.globalAlpha=o.life; ctx.shadowBlur=18; ctx.shadowColor='#ff00ff'; ctx.fillStyle='#ff00ff'; ctx.fillRect(o.x-8,o.y,16,42); ctx.font='26px Arial'; ctx.fillText('⚡',o.x,o.y+34); ctx.restore(); return; }
    if(o.id==='barrel' || o.id==='runcoin'){
      ctx.save(); ctx.shadowBlur=15; ctx.shadowColor = o.id==='runcoin'?'#ffd700':'#ff4400';
      ctx.fillStyle = o.id==='runcoin'?'#ffd700':'#8b4513';
      ctx.beginPath(); ctx.arc(o.x,o.y, o.id==='runcoin'?14:22,0,Math.PI*2); ctx.fill();
      if(o.id==='runcoin'){ ctx.fillStyle='#ff8800'; ctx.font='bold 14px Black Ops One'; ctx.fillText('$',o.x,o.y+5); }
      ctx.restore(); return;
    }
    ctx.font='46px Arial'; ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,0.8)';
    ctx.fillText(o.id==='modtoe'?'🦶':o.id==='acer'?'🕵️‍♂️':'👾',o.x,o.y+16); ctx.shadowBlur=0;
  });

  if(boss && m.type==='boss') drawBoss(ts);

  // Squach
  ctx.save(); ctx.translate(sqX, sqY);
  if(shake>0.1) ctx.translate((Math.random()-0.5)*shake*3, (Math.random()-0.5)*shake*2);
  if(inv>0 && Math.floor(ts/80)%2===0){ ctx.restore(); ctx.restore(); syncHUD(); requestAnimationFrame(mainLoop); return; }
  const col = m.col;
  ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(0,42,22,7,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#4a2e10'; ctx.beginPath(); ctx.ellipse(0,35,23,12,0,0,Math.PI*2); ctx.fill();
  [-18,-9,0,9,18].forEach(tx=>{ ctx.fillStyle='#3a2208'; ctx.beginPath(); ctx.ellipse(tx,40,6,8,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle=col; ctx.shadowBlur=10; ctx.shadowColor=col; ctx.beginPath(); ctx.ellipse(tx,46,4,4,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; });
  ctx.fillStyle='#3a2208'; ctx.fillRect(-13,18,10,18); ctx.fillRect(3,18,10,18);
  ctx.shadowBlur=22; ctx.shadowColor=col; ctx.fillStyle='#2d1f0f'; ctx.beginPath(); ctx.ellipse(0,-2,25,29,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-13,-16); ctx.lineTo(-13,12); ctx.stroke(); ctx.beginPath(); ctx.moveTo(13,-16); ctx.lineTo(13,12); ctx.stroke();
  ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-9,0); ctx.lineTo(0,5); ctx.lineTo(9,0); ctx.closePath(); ctx.fill(); ctx.restore();
  const armSwing = Math.sin(ts*0.003)*0.25;
  ctx.fillStyle='#3a2208';
  ctx.save(); ctx.translate(-25,-8); ctx.rotate(-0.35+armSwing); ctx.beginPath(); ctx.ellipse(0,10,6,13,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(25,-8); ctx.rotate(0.35-armSwing); ctx.beginPath(); ctx.ellipse(0,10,6,13,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  const lookX = Math.max(-3,Math.min(3,(tx-sqX)*0.06)), lookY = Math.max(-2,Math.min(2,(ty-sqY)*0.06));
  ctx.fillStyle='#ddeedd'; ctx.beginPath(); ctx.ellipse(-9,-15,7,7,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(9,-15,7,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-9+lookX,-15+lookY,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(9+lookX,-15+lookY,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-10+lookX,-16+lookY,1.3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(8+lookX,-16+lookY,1.3,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.3; ctx.fillStyle=col; ctx.fillRect(-25,-22,50,9); ctx.restore();
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowBlur=10; ctx.shadowColor=col; ctx.beginPath(); ctx.moveTo(-3,-30); ctx.lineTo(0,-44); ctx.lineTo(3,-30); ctx.stroke();
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(0,-46,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();

  ctx.restore();
  syncHUD();
  requestAnimationFrame(mainLoop);
}
</script>
</body>
</html>
